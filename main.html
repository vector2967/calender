<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 시간표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e4e2db;
    --border-strong: #c8c5bc;
    --text-primary: #1a1916;
    --text-secondary: #6b6860;
    --text-muted: #9e9b95;
    --accent: #2d6a4f;
    --accent-light: #e8f4ee;
    --accent-text: #1b4332;
    --weekend: #7b5ea7;
    --weekend-light: #f0ebf8;
    --weekend-text: #4a3270;
    --busy-bg: #fff8f0;
    --header-h: 56px;
    --time-w: 64px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px 0 24px;
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 12px;
  }

  .header-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }

  .week-nav { display: flex; align-items: center; gap: 6px; }
  .week-label { font-size: 13px; font-weight: 500; min-width: 160px; text-align: center; }

  .nav-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; font-size: 13px; cursor: pointer; color: var(--text-secondary);
    transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; line-height: 1;
  }
  .nav-btn:hover { border-color: var(--border-strong); color: var(--text-primary); background: var(--bg); }
  .today-btn { font-size: 11px; }
  .today-btn.active { color: var(--accent); font-weight: 600; border-color: var(--accent); }

  .header-btns { display: flex; align-items: center; gap: 6px; }
  .clear-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 12px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .clear-btn:hover { border-color: var(--border-strong); color: var(--text-primary); background: var(--bg); }
  .clear-btn.danger { border-color: #f0c0b8; color: #c0392b; }
  .clear-btn.danger:hover { border-color: #c0392b; background: #fdf0ee; }

  .mobile-bar { display: none; flex-direction: column; background: var(--surface); border-bottom: 1px solid var(--border); }
  .mobile-nav-row { display: flex; align-items: center; padding: 8px 12px; gap: 8px; border-bottom: 1px solid var(--border); }
  .mobile-nav-row .week-label-m { flex: 1; text-align: center; font-size: 12px; font-weight: 500; }
  .mobile-btn-row { display: flex; padding: 8px 12px; gap: 8px; }
  .mobile-btn-row button {
    flex: 1; padding: 7px 0; font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
    border-radius: 7px; border: 1px solid var(--border); background: none; color: var(--text-secondary); cursor: pointer;
  }
  .mobile-btn-row button.danger { border-color: #f0c0b8; color: #c0392b; }

  .loading-bar { display: none; text-align: center; font-size: 12px; color: var(--text-muted); padding: 6px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .loading-bar.show { display: block; }

  .main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 48px; }
  .summary-section { margin-bottom: 20px; }
  .summary-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }

  .summary-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 10px; text-align: center; transition: border-color 0.15s; }
  .summary-card:hover { border-color: var(--border-strong); }
  .summary-card .s-day { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
  .summary-card .s-free { font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500; color: var(--text-primary); line-height: 1; }
  .summary-card .s-unit { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
  .summary-card .s-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .summary-card .s-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }
  .summary-card.weekend .s-free { color: var(--weekend); }
  .summary-card.weekend .s-bar-fill { background: var(--weekend); }

  .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }

  thead th { font-size: 12px; font-weight: 600; color: var(--text-secondary); padding: 12px 8px; background: var(--bg); border-bottom: 1px solid var(--border); text-align: center; letter-spacing: 0.02em; }
  thead th.time-th { width: var(--time-w); text-align: left; padding-left: 16px; color: var(--text-muted); }
  thead th.weekend-th { color: var(--weekend); }

  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover td { background: #fafaf8; }

  td.time-td { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); padding: 0 8px 0 16px; white-space: nowrap; width: var(--time-w); vertical-align: middle; }
  td.cell { padding: 2px 4px; vertical-align: middle; }
  td.cell input { display: block; width: 100%; border: none; background: transparent; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--text-primary); padding: 6px 8px; border-radius: 6px; outline: none; transition: background 0.12s; min-height: 32px; }
  td.cell input::placeholder { color: var(--border-strong); font-size: 11px; }
  td.cell input:focus { background: var(--accent-light); }
  td.cell input.filled { background: var(--busy-bg); }
  td.cell.weekend-cell input.filled { background: var(--weekend-light); }

  td.event-td {
    position: relative;
    padding: 0;
  }
  .event-block {
    position: absolute;
    top: 2px; right: 4px; bottom: 2px; left: 4px;
    background: var(--busy-bg);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    cursor: pointer;
    overflow: hidden;
    line-height: 1.4;
    transition: background 0.12s;
  }
  .event-block:hover { background: var(--accent-light); }
  .event-block.weekend-block { background: var(--weekend-light); border-left-color: var(--weekend); }
  .event-block.weekend-block:hover { background: #e4d9f5; }
  .event-title { font-weight: 500; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .event-desc {
    font-size: 10px; color: var(--text-secondary); margin-top: 3px;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3;
    -webkit-box-orient: vertical; line-height: 1.35; white-space: pre-wrap; opacity: 0.9;
  }
  .popup-row.top { align-items: flex-start; }
  .popup-row.top label { padding-top: 7px; }
  .popup-row textarea {
    flex: 1; min-width: 0; width: 0;
    border: 1px solid var(--border); border-radius: 7px;
    padding: 6px 10px; font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif; color: var(--text-primary);
    background: var(--bg); outline: none; resize: vertical;
    min-height: 64px; line-height: 1.5;
  }
  .popup-row textarea:focus { border-color: var(--accent); }

  tfoot tr { background: var(--bg); border-top: 1px solid var(--border); }
  tfoot td { padding: 10px 8px; text-align: center; font-size: 12px; }
  tfoot td.time-td { text-align: left; color: var(--text-muted); font-weight: 500; }
  .foot-free { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--accent-text); display: block; }
  .foot-busy { font-size: 10px; color: var(--text-muted); margin-top: 1px; display: block; }
  tfoot td.weekend-col .foot-free { color: var(--weekend-text); }

  .hint { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 16px; }

  @media (max-width: 640px) {
    header { padding: 0 12px; }
    .week-nav { display: none; }
    .header-btns { display: none; }
    .mobile-bar { display: flex; }
    .main { padding: 12px 8px 48px; }
    .summary-grid { grid-template-columns: repeat(7, minmax(68px, 1fr)); overflow-x: auto; gap: 6px; padding-bottom: 4px; }
    .summary-card { padding: 8px 6px; min-width: 68px; }
    .summary-card .s-free { font-size: 18px; }
    thead th { font-size: 11px; padding: 8px 3px; }
    td.time-td { font-size: 10px; padding: 0 4px 0 8px; width: 48px; }
    td.cell { padding: 1px 2px; }
    td.cell input { font-size: 11px; padding: 5px 4px; min-height: 28px; }
    .event-block { font-size: 11px; padding: 4px 5px; }
    tfoot td { padding: 6px 3px; font-size: 10px; }
    .foot-free { font-size: 11px; }
  }
  /* 설정 팝업 */
  .setting-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .setting-overlay.show { display: flex; }
  .setting-popup {
    background: var(--surface);
    border-radius: 14px;
    padding: 24px;
    width: 420px;
    max-width: 94vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .setting-popup h2 {
    font-size: 15px; font-weight: 600;
    margin-bottom: 4px; color: var(--text-primary);
  }
  .setting-desc {
    font-size: 11px; color: var(--text-muted); margin-bottom: 16px;
  }
  .setting-list {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 12px; overflow-y: auto; flex: 1; min-height: 0;
  }
  .setting-item {
    display: grid;
    grid-template-columns: 1fr 72px 72px 72px 28px;
    gap: 6px;
    align-items: center;
  }
  .setting-item input, .setting-item select {
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 6px 8px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
    width: 100%;
  }
  .setting-item input:focus, .setting-item select:focus { border-color: var(--accent); }
  .setting-item .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 16px; padding: 0;
    line-height: 1; transition: color 0.15s;
  }
  .setting-item .del-btn:hover { color: #c0392b; }
  .setting-header {
    display: grid;
    grid-template-columns: 1fr 72px 72px 72px 28px;
    gap: 6px;
    margin-bottom: 6px;
  }
  .setting-header span {
    font-size: 10px; color: var(--text-muted);
    font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .add-row-btn {
    width: 100%; padding: 8px; border: 1px dashed var(--border);
    border-radius: 8px; background: none; cursor: pointer;
    font-size: 12px; color: var(--text-secondary);
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s; margin-bottom: 16px;
  }
  .add-row-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .setting-btns { display: flex; gap: 8px; }
  .setting-btns button {
    flex: 1; padding: 9px 0; border-radius: 8px; font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
    border: 1px solid var(--border); background: none; color: var(--text-secondary);
  }
  .setting-btns button.confirm {
    background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500;
  }
  .setting-btns button.confirm:hover { background: var(--accent-text); }
  .setting-btns button:not(.confirm):hover { background: var(--bg); }

  @media (max-width: 640px) {
    .setting-popup { width: 94vw; padding: 20px 14px; }
    .setting-item { grid-template-columns: 1fr 60px 60px 60px 24px; gap: 4px; }
    .setting-header { grid-template-columns: 1fr 60px 60px 60px 24px; gap: 4px; }
  }
  .popup-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .popup-overlay.show { display: flex; }

  .popup {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    padding: 24px 24px 40px;
    width: 100%;
    max-width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
  }
  .popup h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-primary);
  }
  .popup-info {
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--bg);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 16px;
  }
  .popup-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    min-width: 0;
  }
  .popup-row label {
    font-size: 12px;
    color: var(--text-secondary);
    width: 56px;
    flex-shrink: 0;
  }
  .popup-row select,
  .popup-row input[type="text"] {
    flex: 1;
    min-width: 0;
    width: 0;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
  }
  .popup-row select:focus,
  .popup-row input[type="text"]:focus { border-color: var(--accent); }
  .popup-btns {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .popup-btns button {
    flex: 1;
    padding: 12px 0;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .popup-btns button.delete {
    border-color: #f0c0b8;
    color: #c0392b;
  }
  .popup-btns button.delete:hover { border-color: #c0392b; background: #fdf0ee; }
  .popup-btns button.confirm {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 500;
  }
  .popup-btns button.confirm:hover { background: var(--accent-text); }
  .popup-btns button:not(.confirm):not(.delete):hover { background: var(--bg); }

  @media (min-width: 641px) {
    .popup-overlay { align-items: center; }
    .popup {
      border-radius: 14px;
      width: 340px;
      max-width: 92vw;
      padding: 24px;
      max-height: 90vh;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-dot"></div>
    <h1>주간 시간표</h1>
  </div>
  <div class="week-nav">
    <button class="nav-btn" id="prevBtn">&#8592;</button>
    <span class="week-label" id="weekLabel"></span>
    <button class="nav-btn" id="nextBtn">&#8594;</button>
    <button class="nav-btn today-btn" id="todayBtn">오늘</button>
  </div>
  <div class="header-btns">
    <button class="clear-btn" id="settingBtn">⚙ 설정</button>
    <button class="clear-btn" id="defaultBtn">수업 기본값</button>
    <button class="clear-btn danger" id="clearBtn">전체 초기화</button>
  </div>
</header>

<div class="mobile-bar">
  <div class="mobile-nav-row">
    <button class="nav-btn" id="mPrevBtn">&#8592;</button>
    <span class="week-label-m" id="weekLabelM"></span>
    <button class="nav-btn" id="mNextBtn">&#8594;</button>
    <button class="nav-btn today-btn" id="mTodayBtn">오늘</button>
  </div>
  <div class="mobile-btn-row">
    <button id="mSettingBtn">⚙ 설정</button>
    <button id="mDefaultBtn">수업 기본값</button>
    <button class="danger" id="mClearBtn">전체 초기화</button>
  </div>
</div>

<div class="loading-bar" id="loadingBar">불러오는 중...</div>

<div class="main">
  <div class="summary-section">
    <div class="summary-label">요일별 여유 시간</div>
    <div class="summary-grid" id="summaryGrid"></div>
  </div>
  <div class="table-container">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th class="time-th">시간</th>
            <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th>
            <th class="weekend-th">토</th><th class="weekend-th">일</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot>
          <tr>
            <td class="time-td">합계</td>
            <td id="tot-0"></td><td id="tot-1"></td><td id="tot-2"></td>
            <td id="tot-3"></td><td id="tot-4"></td>
            <td id="tot-5" class="weekend-col"></td>
            <td id="tot-6" class="weekend-col"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>
  <p class="hint">셀에 할일을 입력하면 빈 시간이 자동으로 계산됩니다 · 모든 기기에서 동기화됩니다</p>
</div>

<!-- 설정 팝업 -->
<div class="setting-overlay" id="settingOverlay">
  <div class="setting-popup">
    <h2>기본 수업 설정</h2>
    <p class="setting-desc">수업 기본값 버튼을 누르면 이 수업들이 자동으로 채워져요</p>
    <div class="setting-header">
      <span>수업명</span><span>요일</span><span>시작</span><span>끝(전)</span><span></span>
    </div>
    <div class="setting-list" id="settingList"></div>
    <button class="add-row-btn" id="addRowBtn">+ 수업 추가</button>
    <div class="setting-btns">
      <button id="settingCancel">취소</button>
      <button class="confirm" id="settingConfirm">저장</button>
    </div>
  </div>
</div>

<!-- 일정 등록 팝업 -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup">
    <h2>일정 등록</h2>
    <div class="popup-info" id="popupInfo"></div>
    <div class="popup-row">
      <label>내용</label>
      <input type="text" id="popupTitle" placeholder="할일 입력" />
    </div>
    <div class="popup-row top">
      <label>메모</label>
      <textarea id="popupDesc" placeholder="상세 설명 (선택)"></textarea>
    </div>
    <div class="popup-row">
      <label>끝 시간</label>
      <select id="popupEnd"></select>
    </div>
    <div class="popup-btns">
      <button id="popupCancel">취소</button>
      <button id="popupDelete" class="delete">삭제</button>
      <button class="confirm" id="popupConfirm">등록</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC030i4ZBO257Mk9XdrZgqqfi_pZuaVwA8",
  authDomain: "chalender-f0a7a.firebaseapp.com",
  databaseURL: "https://chalender-f0a7a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "chalender-f0a7a",
  storageBucket: "chalender-f0a7a.firebasestorage.app",
  messagingSenderId: "923005393591",
  appId: "1:923005393591:web:976ff8371aeb1a0f5d0b32"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const HOURS = [];
for (let h = 6; h <= 23; h++) HOURS.push((h < 10 ? '0' : '') + h + ':00');
const DAYS = ['월','화','수','목','금','토','일'];
const TOTAL = HOURS.length;

const DEFAULT_SCHEDULE = [
  { r: 4,  c: 0, v: '미적분학I' },        { r: 5,  c: 0, v: '미적분학I' },
  { r: 10, c: 0, v: '영어커뮤니케이션(중급)' }, { r: 11, c: 0, v: '영어커뮤니케이션(중급)' },
  { r: 12, c: 0, v: 'AI시대의의사소통과글쓰기기초' }, { r: 13, c: 0, v: 'AI시대의의사소통과글쓰기기초' },
  { r: 4,  c: 1, v: '미적분학I' },        { r: 5,  c: 1, v: '미적분학I' },
  { r: 10, c: 1, v: '컴퓨터개론' }, { r: 11, c: 1, v: '컴퓨터개론' }, { r: 12, c: 1, v: '컴퓨터개론' },
  { r: 3,  c: 2, v: '행렬과논리' }, { r: 4,  c: 2, v: '행렬과논리' },
  { r: 4,  c: 3, v: '기초프로그래밍' }, { r: 5,  c: 3, v: '기초프로그래밍' },
  { r: 6,  c: 3, v: '기초프로그래밍' }, { r: 7,  c: 3, v: '기초프로그래밍' },
  { r: 9,  c: 3, v: '행렬과논리' },
  { r: 10, c: 3, v: '한국사와한국문화' }, { r: 11, c: 3, v: '한국사와한국문화' }, { r: 12, c: 3, v: '한국사와한국문화' },
  { r: 13, c: 4, v: '자기이해와목표설계' }, { r: 14, c: 4, v: '자기이해와목표설계' },
];

let currentMonday = getMonday(new Date());
let data = emptyData();
let descs = {}; // {"r_c": "설명"} — 이벤트 시작 위치 기준

function emptyData() {
  return Array.from({ length: TOTAL }, () => Array(7).fill(''));
}
function applyDefault(d) {
  DEFAULT_SCHEDULE.forEach(({ r, c, v }) => { if (r < TOTAL) d[r][c] = v; });
  return d;
}
function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  d.setHours(0, 0, 0, 0);
  return d;
}
function weekKey(monday) {
  return monday.toISOString().slice(0, 10);
}
function weekLabel(monday) {
  const sun = new Date(monday);
  sun.setDate(monday.getDate() + 6);
  return `${monday.getFullYear()}년 ${monday.getMonth()+1}월 ${monday.getDate()}일 ~ ${sun.getDate()}일`;
}
function setLoading(on) {
  document.getElementById('loadingBar').classList.toggle('show', on);
}

async function saveWeek() {
  const cells = {};
  for (let r = 0; r < TOTAL; r++) {
    for (let c = 0; c < 7; c++) {
      const v = (data[r] && data[r][c]) ? data[r][c] : '';
      if (v) cells[`${r}_${c}`] = v;
    }
  }
  // 실제 셀이 있는 위치의 메모만 유지
  const validDescs = {};
  Object.entries(descs).forEach(([k, v]) => { if (v && cells[k]) validDescs[k] = v; });
  const payload = Object.keys(validDescs).length ? { cells, descs: validDescs } : { cells };
  try {
    await set(ref(db, 'schedules/' + weekKey(currentMonday)), payload);
  } catch(e) {
    localStorage.setItem('wsched_' + weekKey(currentMonday), JSON.stringify(payload));
  }
}

async function loadWeek(monday) {
  const key = weekKey(monday);
  let raw = null;
  try {
    const snap = await get(ref(db, 'schedules/' + key));
    if (snap.exists()) raw = snap.val();
  } catch(e) {
    const saved = localStorage.getItem('wsched_' + key);
    if (saved) raw = JSON.parse(saved);
  }
  if (!raw) { descs = {}; return applyDefault(emptyData()); }

  // 하위 호환: 이전 포맷(flat 문자열) vs 신규 포맷({cells, descs})
  const flat = raw.cells || raw;
  descs = raw.descs || {};

  const d = emptyData();
  Object.entries(flat).forEach(([k, v]) => {
    if (typeof v !== 'string') return; // cells 키만 처리
    const parts = k.split('_');
    if (parts.length !== 2) return;
    const [r, c] = parts.map(Number);
    if (r < TOTAL && c < 7) d[r][c] = v;
  });
  return d;
}

async function moveWeek(delta) {
  await saveWeek();
  currentMonday = new Date(currentMonday);
  currentMonday.setDate(currentMonday.getDate() + delta * 7);
  setLoading(true);
  data = await loadWeek(currentMonday);
  setLoading(false);
  refreshAll();
}
async function goToday() {
  await saveWeek();
  currentMonday = getMonday(new Date());
  setLoading(true);
  data = await loadWeek(currentMonday);
  setLoading(false);
  refreshAll();
}
async function clearDefault() {
  if (!confirm('이번 주를 수업 기본값으로 초기화할까요?')) return;
  data = applyDefault(emptyData());
  descs = {};
  refreshAll();
  await saveWeek();
}
async function clearFull() {
  if (!confirm('이번 주 내용을 전부 삭제할까요?')) return;
  data = emptyData();
  descs = {};
  refreshAll();
  await saveWeek();
}

function refreshAll() {
  const label = weekLabel(currentMonday);
  document.getElementById('weekLabel').textContent = label;
  const lm = document.getElementById('weekLabelM');
  if (lm) lm.textContent = label;
  const isThisWeek = weekKey(currentMonday) === weekKey(getMonday(new Date()));
  document.querySelectorAll('.today-btn').forEach(b => b.classList.toggle('active', isThisWeek));
  renderTableBody();
  updateSummary();
}

function buildSummary() {
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = '';
  DAYS.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'summary-card' + (i >= 5 ? ' weekend' : '');
    card.innerHTML = `
      <div class="s-day">${d}요일</div>
      <div class="s-free" id="sf-${i}">${TOTAL}</div>
      <div class="s-unit">시간 여유</div>
      <div class="s-bar"><div class="s-bar-fill" id="sb-${i}" style="width:100%"></div></div>`;
    grid.appendChild(card);
  });
}

// 팝업 상태
let popupR = 0, popupC = 0;

function openPopup(ri, ci) {
  popupR = ri; popupC = ci;
  const dayName = DAYS[ci] + '요일';
  const startTime = HOURS[ri];
  document.getElementById('popupInfo').textContent = `${dayName} · ${startTime} 시작`;

  const sel = document.getElementById('popupEnd');
  sel.innerHTML = '';
  for (let i = ri + 1; i < HOURS.length; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = HOURS[i];
    sel.appendChild(opt);
  }

  const existing = (data[ri] && data[ri][ci]) ? data[ri][ci] : '';
  document.getElementById('popupTitle').value = existing;
  document.getElementById('popupDesc').value = descs[ri + '_' + ci] || '';

  // 기존 내용 있으면 삭제 버튼 표시
  const delBtn = document.getElementById('popupDelete');
  delBtn.style.display = existing.trim() ? 'block' : 'none';

  // 끝 시간 자동 감지 (같은 내용이 연속된 마지막 행)
  if (existing.trim()) {
    let endIdx = ri + 1;
    while (endIdx < HOURS.length && data[endIdx] && data[endIdx][ci] === existing) endIdx++;
    sel.value = endIdx < HOURS.length ? endIdx : HOURS.length - 1;
  }

  document.getElementById('popupOverlay').classList.add('show');
  setTimeout(() => document.getElementById('popupTitle').focus(), 50);
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
}

async function confirmPopup() {
  const title = document.getElementById('popupTitle').value.trim();
  if (!title) { closePopup(); return; }
  const endR = parseInt(document.getElementById('popupEnd').value);
  const desc = document.getElementById('popupDesc').value.trim();

  for (let r = popupR; r < endR; r++) {
    if (!data[r]) data[r] = Array(7).fill('');
    data[r][popupC] = title;
  }
  const key = popupR + '_' + popupC;
  if (desc) descs[key] = desc; else delete descs[key];

  refreshAll();
  await saveWeek();
  closePopup();
}

async function deleteEvent() {
  const title = (data[popupR] && data[popupR][popupC]) ? data[popupR][popupC] : '';
  if (!title) { closePopup(); return; }
  // 이벤트 시작 행 탐색 (메모 키 삭제용)
  let r = popupR;
  while (r >= 0 && data[r] && data[r][popupC] === title) r--;
  r++;
  const startR = r;
  while (r < TOTAL && data[r] && data[r][popupC] === title) {
    data[r][popupC] = '';
    r++;
  }
  delete descs[startR + '_' + popupC];
  refreshAll();
  await saveWeek();
  closePopup();
}

function renderTableBody() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  const skip = Array.from({ length: TOTAL }, () => Array(7).fill(false));

  HOURS.forEach((h, ri) => {
    const tr = document.createElement('tr');
    const tc = document.createElement('td');
    tc.className = 'time-td';
    tc.textContent = h;
    tr.appendChild(tc);

    DAYS.forEach((_, ci) => {
      if (skip[ri][ci]) return;
      const val = (data[ri] && data[ri][ci]) ? data[ri][ci] : '';
      const isWeekend = ci >= 5;
      const td = document.createElement('td');

      if (val.trim()) {
        let span = 1;
        while (ri + span < TOTAL && data[ri + span] && data[ri + span][ci] === val) {
          skip[ri + span][ci] = true;
          span++;
        }
        td.className = 'event-td' + (isWeekend ? ' weekend-cell' : '');
        if (span > 1) td.rowSpan = span;
        const block = document.createElement('div');
        block.className = 'event-block' + (isWeekend ? ' weekend-block' : '');
        const titleEl = document.createElement('div');
        titleEl.className = 'event-title';
        titleEl.textContent = val;
        block.appendChild(titleEl);
        const desc = descs[ri + '_' + ci];
        if (desc) {
          const descEl = document.createElement('div');
          descEl.className = 'event-desc';
          descEl.textContent = desc;
          block.appendChild(descEl);
        }
        block.addEventListener('click', () => openPopup(ri, ci));
        td.appendChild(block);
      } else {
        td.className = 'cell' + (isWeekend ? ' weekend-cell' : '');
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.dataset.r = ri;
        inp.dataset.c = ci;
        inp.placeholder = '+';
        inp.addEventListener('focus', function() {
          openPopup(parseInt(this.dataset.r), parseInt(this.dataset.c));
          this.blur();
        });
        td.appendChild(inp);
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function buildTable() {
  renderTableBody();
}

function updateSummary() {
  DAYS.forEach((_, ci) => {
    let busy = 0;
    for (let ri = 0; ri < TOTAL; ri++) {
      if (data[ri] && (data[ri][ci] || '').trim() !== '') busy++;
    }
    const free = TOTAL - busy;
    const sf = document.getElementById('sf-' + ci);
    const sb = document.getElementById('sb-' + ci);
    const tot = document.getElementById('tot-' + ci);
    if (sf) sf.textContent = free;
    if (sb) sb.style.width = Math.round(free / TOTAL * 100) + '%';
    if (tot) tot.innerHTML = `<span class="foot-free">${free}h 여유</span><span class="foot-busy">${busy}h 일정</span>`;
  });
}

// ── 설정 팝업 ──────────────────────────────────────
// DEFAULT_SCHEDULE을 {name, day, startR, endR} 형태로 변환해서 편집
let editableSchedule = [];

function scheduleToEditable(sched) {
  // {r,c,v} 배열 → {name, day, startR, endR} 묶기
  // endR은 마지막 r + 1 (exclusive) 로 통일
  const map = {};
  sched.forEach(({ r, c, v }) => {
    const key = v + '|' + c;
    if (!map[key]) map[key] = { name: v, day: c, startR: r, endR: r + 1 };
    else {
      map[key].startR = Math.min(map[key].startR, r);
      map[key].endR   = Math.max(map[key].endR, r + 1);
    }
  });
  return Object.values(map);
}

function editableToSchedule(editable) {
  const result = [];
  editable.forEach(({ name, day, startR, endR }) => {
    if (!name.trim()) return;
    for (let r = parseInt(startR); r < parseInt(endR); r++) {
      result.push({ r, c: parseInt(day), v: name.trim() });
    }
  });
  return result;
}

function renderSettingList() {
  const list = document.getElementById('settingList');
  list.innerHTML = '';
  editableSchedule.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'setting-item';
    row.innerHTML = `
      <input type="text" value="${item.name}" placeholder="수업명" data-idx="${idx}" data-field="name" />
      <select data-idx="${idx}" data-field="day">
        ${DAYS.map((d, i) => `<option value="${i}" ${item.day == i ? 'selected' : ''}>${d}</option>`).join('')}
      </select>
      <select data-idx="${idx}" data-field="startR">
        ${HOURS.map((h, i) => `<option value="${i}" ${item.startR == i ? 'selected' : ''}>${h}</option>`).join('')}
      </select>
      <select data-idx="${idx}" data-field="endR">
        ${HOURS.map((h, i) => `<option value="${i}" ${item.endR == i ? 'selected' : ''}>${h}</option>`).join('')}
      </select>
      <button class="del-btn" data-idx="${idx}">×</button>
    `;
    list.appendChild(row);
  });

  // 이벤트 연결
  list.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('change', function() {
      const idx = parseInt(this.dataset.idx);
      const field = this.dataset.field;
      editableSchedule[idx][field] = field === 'name' ? this.value : parseInt(this.value);
    });
    if (el.tagName === 'INPUT') {
      el.addEventListener('input', function() {
        editableSchedule[parseInt(this.dataset.idx)].name = this.value;
      });
    }
  });
  list.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      editableSchedule.splice(parseInt(this.dataset.idx), 1);
      renderSettingList();
    });
  });
}

function openSetting() {
  editableSchedule = scheduleToEditable(DEFAULT_SCHEDULE);
  renderSettingList();
  document.getElementById('settingOverlay').classList.add('show');
}

function closeSetting() {
  document.getElementById('settingOverlay').classList.remove('show');
}

async function saveSetting() {
  const toSave = editableSchedule.filter(s => s.name.trim());
  // 기존 기본 일정 셀 먼저 지우기 (시간 축소 시 이전 칸 제거)
  DEFAULT_SCHEDULE.forEach(({ r, c }) => { if (data[r]) data[r][c] = ''; });
  DEFAULT_SCHEDULE.length = 0;
  editableToSchedule(toSave).forEach(item => DEFAULT_SCHEDULE.push(item));
  set(ref(db, 'defaultSchedule'), toSave).catch(() => {
    localStorage.setItem('wsched_default', JSON.stringify(toSave));
  });
  // 새 기본 일정 적용
  applyDefault(data);
  refreshAll();
  await saveWeek();
  closeSetting();
}

async function loadDefaultSchedule() {
  try {
    const snap = await get(ref(db, 'defaultSchedule'));
    if (snap.exists()) {
      const saved = snap.val();
      // Firebase가 배열을 객체로 반환할 수 있으므로 Object.values 처리
      const arr = Array.isArray(saved) ? saved : Object.values(saved);
      DEFAULT_SCHEDULE.length = 0;
      editableToSchedule(arr).forEach(item => DEFAULT_SCHEDULE.push(item));
      return;
    }
    // Firebase 비어있음 → 하드코딩 기본값을 Firebase에 최초 1회 자동 저장
    const seedEditable = scheduleToEditable(DEFAULT_SCHEDULE);
    await set(ref(db, 'defaultSchedule'), seedEditable);
    return; // DEFAULT_SCHEDULE은 그대로 유지
  } catch(e) {}
  // fallback: localStorage
  const saved = localStorage.getItem('wsched_default');
  if (saved) {
    try {
      const arr = JSON.parse(saved);
      DEFAULT_SCHEDULE.length = 0;
      editableToSchedule(arr).forEach(item => DEFAULT_SCHEDULE.push(item));
    } catch(e) {}
  }
}

// ── 초기 실행 ──────────────────────────────────────
buildSummary();
buildTable();
setLoading(true);
await loadDefaultSchedule();
data = await loadWeek(currentMonday);
setLoading(false);
refreshAll();

// 버튼 이벤트 연결
document.getElementById('prevBtn').addEventListener('click', () => moveWeek(-1));
document.getElementById('nextBtn').addEventListener('click', () => moveWeek(1));
document.getElementById('todayBtn').addEventListener('click', goToday);
document.getElementById('defaultBtn').addEventListener('click', clearDefault);
document.getElementById('clearBtn').addEventListener('click', clearFull);
document.getElementById('settingBtn').addEventListener('click', openSetting);
document.getElementById('mPrevBtn').addEventListener('click', () => moveWeek(-1));
document.getElementById('mNextBtn').addEventListener('click', () => moveWeek(1));
document.getElementById('mTodayBtn').addEventListener('click', goToday);
document.getElementById('mDefaultBtn').addEventListener('click', clearDefault);
document.getElementById('mClearBtn').addEventListener('click', clearFull);
document.getElementById('mSettingBtn').addEventListener('click', openSetting);
document.getElementById('popupCancel').addEventListener('click', closePopup);
document.getElementById('popupDelete').addEventListener('click', deleteEvent);
document.getElementById('popupConfirm').addEventListener('click', confirmPopup);
document.getElementById('popupOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closePopup(); });
document.getElementById('popupTitle').addEventListener('keydown', e => { if (e.key === 'Enter') confirmPopup(); if (e.key === 'Escape') closePopup(); });
document.getElementById('settingCancel').addEventListener('click', closeSetting);
document.getElementById('settingConfirm').addEventListener('click', saveSetting);
document.getElementById('settingOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeSetting(); });
document.getElementById('addRowBtn').addEventListener('click', () => {
  editableSchedule.push({ name: '', day: 0, startR: 3, endR: 3 });
  renderSettingList();
});
</script>
